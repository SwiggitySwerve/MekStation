name: PR Checks

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened, ready_for_review]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ---------------------------------------------------------------
  # detect-changes gates the expensive build jobs. Docs/openspec-only
  # PRs skip prepare-build and the 3-platform build-test matrix.
  # ---------------------------------------------------------------
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      code: ${{ steps.filter.outputs.code }}
      e2e: ${{ steps.filter.outputs.e2e }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Filter paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            code:
              - 'src/**'
              - 'public/**'
              - 'desktop/**'
              - 'scripts/**'
              - 'config/**'
              - 'package.json'
              - 'package-lock.json'
              - 'next.config.*'
              - 'tsconfig.json'
              - 'jest.config.*'
              - 'jest.setup.*'
              - '.babelrc*'
              - '.github/workflows/**'
              - '.github/actions/**'
            e2e:
              - 'e2e/**'
              - 'playwright.config.*'

  # ---------------------------------------------------------------
  # install-deps runs first so the other lint/test/type/build jobs
  # can reuse a single `npm ci`. It populates the node_modules cache
  # keyed on (OS, node version, lockfile hash); fan-out jobs restore
  # from that cache and skip `npm ci` entirely on a hit.
  # ---------------------------------------------------------------
  install-deps:
    name: Install Dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node + caches + install deps
        uses: ./.github/actions/setup-node-and-install
        with:
          node-version: '20'
          fetch-assets: 'true'

  lint:
    name: Lint
    needs: install-deps
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node + caches + install deps
        uses: ./.github/actions/setup-node-and-install
        with:
          node-version: '20'

      - name: Run linter
        run: npm run lint

  format-check:
    name: Format Check
    needs: install-deps
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node + caches + install deps
        uses: ./.github/actions/setup-node-and-install
        with:
          node-version: '20'

      - name: Check formatting
        run: npm run format:check

  typecheck:
    name: Type Check
    needs: install-deps
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node + caches + install deps
        uses: ./.github/actions/setup-node-and-install
        with:
          node-version: '20'

      - name: Run type check
        run: npx tsc --noEmit

  unit-test-shards:
    name: Unit Tests (${{ matrix.shard }}/6)
    needs: install-deps
    runs-on: ubuntu-latest
    timeout-minutes: 8
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4, 5, 6]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node + caches + install deps
        uses: ./.github/actions/setup-node-and-install
        with:
          node-version: '20'

      - name: Run unit test shard
        run: npx jest --selectProjects unit --ci --shard=${{ matrix.shard }}/6
        env:
          JEST_EXCLUDE_PERF_SENSITIVE: 'true'

  perf-smoke-tests:
    name: Perf Smoke Tests
    needs: install-deps
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node + caches + install deps
        uses: ./.github/actions/setup-node-and-install
        with:
          node-version: '20'

      - name: Run CI-sized perf-sensitive simulation tests
        run: >-
          npx jest --selectProjects unit --ci --runInBand --runTestsByPath
          src/simulation/__tests__/integration.test.ts
          src/simulation/__tests__/simulation-combat-integration.test.ts
          src/simulation/__tests__/swarm-pilot-skills-batch.test.ts
          src/simulation/__tests__/swarm-throughput.test.ts
        env:
          SIMULATION_COUNT: '5'
          SIMULATION_COMBAT_DESTRUCTION_BATCH_COUNT: '10'
          SIMULATION_COMBAT_FULL_BATCH_COUNT: '3'
          SIMULATION_COMBAT_PILOT_DEATH_BATCH_COUNT: '3'
          SIMULATION_COMBAT_PSR_BATCH_COUNT: '3'
          SIMULATION_PILOT_SKILL_BATCH_COUNT: '5'
          SIMULATION_PROFILE_AVG_GAME_BUDGET_MS: '4500'
          SIMULATION_PROFILE_GAME_COUNT: '5'
          SIMULATION_PROFILE_RUNNER_BUDGET_MS: '4000'
          SIMULATION_PROFILE_TIME_BUDGET_MS: '30000'
          SWARM_THROUGHPUT_RUN_COUNT: '25'
          SWARM_THROUGHPUT_TIME_BUDGET_MS: '15000'

  statistical-proof-pr:
    name: Statistical Proof PR
    needs: install-deps
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node + caches + install deps
        uses: ./.github/actions/setup-node-and-install
        with:
          node-version: '20'

      - name: Run 100-game statistical combat proofs
        run: >-
          npx jest --selectProjects unit --ci --runInBand --runTestsByPath
          src/simulation/__tests__/integration.test.ts
        env:
          SIMULATION_COUNT: '100'
          SIMULATION_PROFILE_AVG_GAME_BUDGET_MS: '4500'
          SIMULATION_PROFILE_GAME_COUNT: '10'
          SIMULATION_PROFILE_RUNNER_BUDGET_MS: '4000'
          SIMULATION_PROFILE_TIME_BUDGET_MS: '30000'

  perf-budget-pr:
    name: Perf Budget PR
    needs: install-deps
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node + caches + install deps
        uses: ./.github/actions/setup-node-and-install
        with:
          node-version: '20'

      - name: Run simulation wall-clock budgets
        run: >-
          npx jest --selectProjects unit --ci --runInBand --runTestsByPath
          src/simulation/__tests__/simulation.test.ts
        env:
          SIMULATION_PERF_ASSERTIONS: 'true'
          SIMULATION_COUNT: '10'

  coverage-floor:
    name: Coverage Floor
    needs: install-deps
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node + caches + install deps
        uses: ./.github/actions/setup-node-and-install
        with:
          node-version: '20'

      - name: Generate combat/simulation coverage summary
        run: >-
          npx jest --selectProjects unit --ci --coverage
          --coverageDirectory=coverage/combat-simulation
          --coverageReporters=json-summary
          --coverageReporters=text-summary
          --runInBand
          --runTestsByPath
          src/simulation/__tests__/knownLimitations.test.ts
          src/simulation/__tests__/simulation.test.ts
          src/simulation/runner/__tests__/combatValidationScope.contract.test.ts
          --collectCoverageFrom='src/simulation/**/*.{ts,tsx}'
          --collectCoverageFrom='src/utils/gameplay/**/*.{ts,tsx}'
          --coverageThreshold='{}'
        env:
          SIMULATION_COUNT: '5'

      - name: Enforce combat/simulation coverage floors
        run: node scripts/qc/validate-combat-simulation-coverage.mjs --summary=coverage/combat-simulation/coverage-summary.json

  a11y-tests:
    name: A11y Tests
    needs: install-deps
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node + caches + install deps
        uses: ./.github/actions/setup-node-and-install
        with:
          node-version: '20'

      - name: Run a11y tests (axe-core)
        # Gates accessibility regressions for in-scope components. Runs
        # the dedicated `a11y` Jest project — see jest.config.js for the
        # `**/*.a11y.test.(ts|tsx)` glob and jest.setup.a11y.ts for
        # `expect(...).toHaveNoViolations()` matchers.
        run: npx jest --selectProjects a11y --ci

  validate-bv:
    name: Validate BV Parity
    needs: install-deps
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node + caches + install deps
        uses: ./.github/actions/setup-node-and-install
        with:
          node-version: '20'
          fetch-assets: 'true'

      - name: Validate BV parity
        run: npm run validate:bv

  validate-combat:
    name: Validate Combat Suite
    needs: install-deps
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node + caches + install deps
        uses: ./.github/actions/setup-node-and-install
        with:
          node-version: '20'
          fetch-assets: 'true'

      - name: Validate combat catalog/test/spec consistency
        run: npm run validate:combat

  storybook-build:
    name: Build Storybook
    needs: install-deps
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node + caches + install deps
        uses: ./.github/actions/setup-node-and-install
        with:
          node-version: '20'

      - name: Build Storybook
        run: npm run storybook:build

  # ---------------------------------------------------------------
  # schema-bridge gates the cross-language schema contract:
  #   1. Generated Zod matches the canonical JSON Schema source
  #   2. Python validator passes on the corpus (PR-A1 = weapon only,
  #      non-strict; PR-A2 will flip to --strict --shape all)
  #   3. TypeScript round-trip Jest tests pass for the weapon shape
  # The job runs in parallel after install-deps and is included in
  # the `lint-and-test` aggregator so branch protection picks it up.
  # ---------------------------------------------------------------
  schema-bridge:
    name: Schema Bridge
    needs: install-deps
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node + caches + install deps
        uses: ./.github/actions/setup-node-and-install
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python schema-bridge deps
        run: pip install jsonschema

      - name: Verify generated Zod matches JSON Schema
        run: npm run schema:gen-check

      - name: Validate full corpus (all 6 shapes, strict)
        # PR-A2 flips the gate to --shape all --strict. Drift in any of
        # weapon / ammunition / electronics / misc_equipment /
        # physical_weapon / unit fails the build immediately.
        run: python scripts/megameklab-conversion/run_schema_validation_only.py --shape all --strict

      - name: Run cross-language schema-bridge Jest tests
        # All 6 contract test suites (weapon + unit + ammunition +
        # electronics + misc-equipment + physical-weapon).
        run: npx jest src/types/contracts --ci --no-coverage

      - name: Upload schema-bridge report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: schema-bridge-report
          path: validation-output/schema-bridge-report.json
          retention-days: 7

  # ---------------------------------------------------------------
  # determinism-audit gates non-determinism in the combat pipeline.
  # Per add-combat-fidelity-suite (Phase 0, Requirement: Audit of
  # Unseeded Dice in Combat Pipeline), `Math.random()` is forbidden
  # inside `src/utils/gameplay/` and `src/simulation/` outside the
  # `defaultD6Roller` definition site (`src/utils/gameplay/diceTypes.ts`).
  #
  # Allowlist (legitimate non-dice entropy paths):
  #   - src/utils/gameplay/diceTypes.ts        — defaultD6Roller (the seam)
  #   - src/utils/gameplay/aerospace/criticalHits.ts — unused dead path
  #   - src/utils/gameplay/terrainGenerator.ts — seed fallback for procgen
  #   - src/simulation/QuickResolveService.ts  — crypto.getRandomValues fallback
  #
  # Failures print the offending file and line so CI logs identify the
  # regression site directly.
  # ---------------------------------------------------------------
  determinism-audit:
    name: Determinism Audit
    needs: install-deps
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Audit Math.random() in combat pipeline
        shell: bash
        run: |
          set -euo pipefail
          ALLOWLIST=(
            'src/utils/gameplay/diceTypes.ts'
            'src/utils/gameplay/aerospace/criticalHits.ts'
            'src/utils/gameplay/terrainGenerator.ts'
            'src/simulation/QuickResolveService.ts'
          )
          GLOBS=(-g 'src/utils/gameplay/**' -g 'src/simulation/**')
          for path in "${ALLOWLIST[@]}"; do
            GLOBS+=(-g "!${path}")
          done
          # Strip block-comment lines ('* Math.random()') and line-comment
          # lines ('// Math.random()') so doc-comments referencing the API
          # by name don't trip the audit.
          matches="$(rg -n --no-heading "${GLOBS[@]}" 'Math\.random\(\)' . \
            | grep -Ev ':[[:space:]]*\*|//.*Math\.random|\* .*Math\.random' \
            || true)"
          if [ -n "$matches" ]; then
            echo "$matches"
            echo ""
            echo "ERROR: Math.random() found in src/utils/gameplay/ or src/simulation/ outside the defaultD6Roller seam."
            echo "Inject a D6Roller (use SeededD6Roller in tests) or add an explicit allowlist entry to .github/workflows/pr-checks.yml if this is non-dice entropy."
            exit 1
          fi
          echo "Determinism audit passed: no unseeded dice in combat pipeline."

  # ---------------------------------------------------------------
  # e2e-smoke runs the tactical-map Playwright gate spec in a real
  # chromium browser against the self-booted Next dev server
  # (playwright.config.ts webServer). Closes audit finding E-1: the
  # Playwright suite previously ran in NO CI workflow, so e2e
  # assertions drifted from production unseen. Bounded to ONE spec
  # file and ONE project to keep the lane inside the PR budget.
  # The job always runs (so the lint-and-test aggregator's needs
  # chain stays green), but its work is gated per-step on the
  # detect-changes code/e2e filters — docs/openspec-only PRs no-op.
  # ---------------------------------------------------------------
  e2e-smoke:
    name: E2E Smoke
    needs: [detect-changes, install-deps]
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Skip (no code or e2e changes)
        if: needs.detect-changes.outputs.code != 'true' && needs.detect-changes.outputs.e2e != 'true'
        run: echo "No code or e2e changes — skipping e2e smoke."

      - name: Checkout code
        if: needs.detect-changes.outputs.code == 'true' || needs.detect-changes.outputs.e2e == 'true'
        uses: actions/checkout@v6

      - name: Setup Node + caches + install deps
        if: needs.detect-changes.outputs.code == 'true' || needs.detect-changes.outputs.e2e == 'true'
        uses: ./.github/actions/setup-node-and-install
        with:
          node-version: '20'

      - name: Resolve Playwright version for browser cache key
        if: needs.detect-changes.outputs.code == 'true' || needs.detect-changes.outputs.e2e == 'true'
        id: playwright-version
        shell: bash
        run: echo "version=$(node -e "console.log(require('@playwright/test/package.json').version)")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright chromium browser
        if: needs.detect-changes.outputs.code == 'true' || needs.detect-changes.outputs.e2e == 'true'
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright chromium browser
        if: (needs.detect-changes.outputs.code == 'true' || needs.detect-changes.outputs.e2e == 'true') && steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system dependencies (browser cached)
        if: (needs.detect-changes.outputs.code == 'true' || needs.detect-changes.outputs.e2e == 'true') && steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run tactical-map visual smoke suite
        if: needs.detect-changes.outputs.code == 'true' || needs.detect-changes.outputs.e2e == 'true'
        run: npx playwright test e2e/tactical-map-visual-smoke.spec.ts --project=chromium

      - name: Upload Playwright report
        if: failure() && (needs.detect-changes.outputs.code == 'true' || needs.detect-changes.outputs.e2e == 'true')
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
          retention-days: 7

  # Aggregator that preserves the "Lint and Test" required-check name
  # from before the fan-out. Passes only if every fan-out job passed.
  lint-and-test:
    name: Lint and Test
    needs:
      [
        lint,
        format-check,
        typecheck,
        unit-test-shards,
        perf-smoke-tests,
        statistical-proof-pr,
        perf-budget-pr,
        coverage-floor,
        a11y-tests,
        validate-bv,
        validate-combat,
        storybook-build,
        schema-bridge,
        determinism-audit,
        e2e-smoke,
      ]
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: All fan-out checks passed
        run: echo "All fan-out checks passed"

  # prepare-build always runs (to satisfy branch-protection required check
  # names), but its work is gated per-step on detect-changes.outputs.code.
  # Docs/openspec-only PRs early-exit with a no-op step.
  prepare-build:
    name: Prepare Build Artifacts
    needs: detect-changes
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Skip (no code changes)
        if: needs.detect-changes.outputs.code != 'true'
        run: echo "No code changes — skipping build."

      - name: Checkout code
        if: needs.detect-changes.outputs.code == 'true'
        uses: actions/checkout@v6

      - name: Setup Node + caches + install deps
        if: needs.detect-changes.outputs.code == 'true'
        uses: ./.github/actions/setup-node-and-install
        with:
          node-version: '20'
          fetch-assets: 'true'

      - name: Validate assets
        if: needs.detect-changes.outputs.code == 'true'
        run: npm run validate:assets:strict

      - name: Build Next.js application
        if: needs.detect-changes.outputs.code == 'true'
        run: npm run build

      - name: Build Electron TypeScript
        if: needs.detect-changes.outputs.code == 'true'
        working-directory: desktop
        run: npm run build

      - name: Upload web build artifacts
        if: needs.detect-changes.outputs.code == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: web-build
          path: |
            .next/standalone
            .next/static
            desktop/dist
            public/record-sheets
          retention-days: 1

  # build-test always runs so the per-platform required checks
  # ("Build Test / win", etc.) report SUCCESS on docs-only PRs.
  # Work is gated per-step on detect-changes.outputs.code.
  build-test:
    name: Build Test / ${{ matrix.platform }}
    needs: [detect-changes, prepare-build]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac
    timeout-minutes: 30

    steps:
      - name: Skip (no code changes)
        if: needs.detect-changes.outputs.code != 'true'
        run: echo "No code changes — skipping build."

      - name: Checkout code
        if: needs.detect-changes.outputs.code == 'true'
        uses: actions/checkout@v6

      - name: Setup Node + caches + install deps
        if: needs.detect-changes.outputs.code == 'true'
        uses: ./.github/actions/setup-node-and-install
        with:
          node-version: '20'
          skip-nextjs-cache: 'true'

      - name: Download build artifacts
        if: needs.detect-changes.outputs.code == 'true'
        uses: actions/download-artifact@v8
        with:
          name: web-build

      - name: Restore artifact structure
        if: needs.detect-changes.outputs.code == 'true'
        shell: bash
        run: |
          # Move downloaded artifacts to their correct locations
          # download-artifact extracts to current directory preserving structure
          # Verify the artifacts are in place
          test -d .next/standalone || { echo "Missing .next/standalone"; exit 1; }
          test -d public/record-sheets || { echo "Missing public/record-sheets"; exit 1; }
          test -d .next/static || { echo "Missing .next/static"; exit 1; }
          test -d desktop/dist || { echo "Missing desktop/dist"; exit 1; }

      - name: Rebuild native modules for platform
        if: needs.detect-changes.outputs.code == 'true'
        working-directory: desktop
        shell: bash
        run: npm run rebuild:next-standalone

      - name: Test Electron build (pack mode)
        if: needs.detect-changes.outputs.code == 'true'
        working-directory: desktop
        shell: bash
        run: npx electron-builder --dir --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          SKIP_NOTARIZATION: 'true'
          ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/desktop/.electron-cache

      - name: Verify build output
        if: needs.detect-changes.outputs.code == 'true'
        working-directory: desktop
        shell: bash
        run: |
          if [ "${{ matrix.platform }}" = "win" ]; then
            test -d release/win-unpacked || exit 1
            test -f release/win-unpacked/"MekStation.exe" || exit 1
          elif [ "${{ matrix.platform }}" = "mac" ]; then
            mac_dirs="$(compgen -G "release/mac*")"
            if [ -n "$mac_dirs" ]; then
              mac_apps="$(compgen -G "release/mac*/MekStation.app")"
              [ -n "$mac_apps" ] || exit 1
            else
              exit 1
            fi
          else
            test -d release/linux-unpacked || exit 1
          fi
